apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: traefik-statefulset
  namespace: kube-public
  labels:
    app: traefik
spec:
  serviceName: traefik-service
  replicas: 2
  selector:
    matchLabels:
      app: traefik
  template:
    metadata:
      labels:
        app: traefik
    spec:
      serviceAccountName: traefik-service-account
      restartPolicy: Always
      containers:
        - name: traefik
          image: traefik:2.7
          args:
            - --api.insecure=true
            - --entrypoints.web.address=:80
            - --providers.kubernetesingress=true
            - --providers.kubernetesingress.ingressclass=traefik
          ports:
            - name: http
              containerPort: 80
            - name: dashboard
              containerPort: 8080
