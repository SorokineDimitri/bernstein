<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M1,1 L9,5 L1,9 Z" fill="#111827"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M1,1 L9,5 L1,9 Z" fill="#2563eb"/>
    </marker>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="4" stdDeviation="3" flood-color="#000000" flood-opacity="0.16"/>
    </filter>
    <style>
      text { font-family: Arial, Helvetica, sans-serif; fill: #111827; }
      .title { font-size: 38px; font-weight: 700; }
      .subtitle { font-size: 18px; fill: #4b5563; }
      .section { font-size: 23px; font-weight: 700; }
      .label { font-size: 24px; font-weight: 700; }
      .small { font-size: 16px; fill: #374151; }
      .tiny { font-size: 14px; fill: #4b5563; }
      .box { stroke: #111827; stroke-width: 2.4; rx: 16; filter: url(#shadow); }
      .ns { stroke: #94a3b8; stroke-width: 2; stroke-dasharray: 10 8; rx: 20; fill: #f8fafc; }
      .cluster { stroke: #d97706; stroke-width: 3; rx: 28; fill: #fff7d6; }
      .arrow { stroke: #111827; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .arrowBlue { stroke: #2563eb; stroke-width: 2.5; fill: none; marker-end: url(#arrowBlue); }
      .dashArrow { stroke: #2563eb; stroke-width: 2.2; stroke-dasharray: 8 7; fill: none; marker-end: url(#arrowBlue); }
    </style>
  </defs>

  <rect x="0" y="0" width="1600" height="1000" fill="#ffffff"/>

  <text x="800" y="52" text-anchor="middle" class="title">Bernstein Kubernetes Architecture</text>
  <text x="800" y="82" text-anchor="middle" class="subtitle">Current project state: Minikube + Traefik ingress + Poll/Result/Worker + Redis/Postgres + cAdvisor</text>

  <rect x="60" y="110" width="1480" height="835" class="cluster"/>
  <text x="800" y="148" text-anchor="middle" class="section">Minikube cluster: bernstein</text>
  <text x="800" y="174" text-anchor="middle" class="small">3 nodes • local scripts use port-forward for browser access</text>

  <rect x="95" y="205" width="1410" height="98" rx="20" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="130" y="242" class="section">Local browser access</text>
  <text x="130" y="272" class="small">/etc/hosts: poll.dop.io and result.dop.io → 127.0.0.1</text>
  <text x="570" y="242" class="small">Poll / Result: localhost:30021 → Traefik :80</text>
  <text x="570" y="272" class="small">Traefik dashboard: localhost:30042 → Traefik :8080</text>
  <text x="1085" y="257" class="small">cAdvisor: localhost:8080 → cadvisor-service :8080</text>

  <rect x="95" y="330" width="1410" height="170" class="ns"/>
  <text x="120" y="365" class="section">kube-public namespace</text>

  <rect x="170" y="390" width="235" height="78" class="box" fill="#fde68a"/>
  <text x="288" y="421" text-anchor="middle" class="label">traefik-service</text>
  <text x="288" y="448" text-anchor="middle" class="small">NodePort 30021 / 30042</text>

  <rect x="535" y="382" width="260" height="94" class="box" fill="#fed7aa"/>
  <text x="665" y="415" text-anchor="middle" class="label">Traefik</text>
  <text x="665" y="441" text-anchor="middle" class="small">Deployment • 2 replicas</text>
  <text x="665" y="463" text-anchor="middle" class="tiny">image: traefik:2.7</text>

  <rect x="925" y="382" width="285" height="94" class="box" fill="#fde68a"/>
  <text x="1068" y="415" text-anchor="middle" class="label">app-ingress</text>
  <text x="1068" y="441" text-anchor="middle" class="small">poll.dop.io → poll-service</text>
  <text x="1068" y="463" text-anchor="middle" class="small">result.dop.io → result-service</text>

  <rect x="1295" y="382" width="155" height="94" class="box" fill="#e0f2fe"/>
  <text x="1373" y="417" text-anchor="middle" class="label">RBAC</text>
  <text x="1373" y="444" text-anchor="middle" class="small">watch ingress</text>
  <text x="1373" y="465" text-anchor="middle" class="small">services/endpoints</text>

  <path d="M405 429 L535 429" class="arrow"/>
  <path d="M795 429 L925 429" class="arrow"/>
  <path d="M1295 429 L1210 429" class="dashArrow"/>

  <rect x="95" y="530" width="1010" height="360" class="ns"/>
  <text x="120" y="565" class="section">default namespace</text>

  <rect x="155" y="610" width="220" height="88" class="box" fill="#bfdbfe"/>
  <text x="265" y="642" text-anchor="middle" class="label">Poll</text>
  <text x="265" y="668" text-anchor="middle" class="small">Deployment • 2 replicas</text>
  <text x="265" y="689" text-anchor="middle" class="tiny">poll-service :80</text>

  <rect x="155" y="765" width="220" height="88" class="box" fill="#bfdbfe"/>
  <text x="265" y="797" text-anchor="middle" class="label">Result</text>
  <text x="265" y="823" text-anchor="middle" class="small">Deployment • 2 replicas</text>
  <text x="265" y="844" text-anchor="middle" class="tiny">result-service :80</text>

  <rect x="470" y="608" width="230" height="92" class="box" fill="#fecaca"/>
  <text x="585" y="640" text-anchor="middle" class="label">Redis</text>
  <text x="585" y="666" text-anchor="middle" class="small">StatefulSet • 1 replica</text>
  <text x="585" y="687" text-anchor="middle" class="tiny">redis-service :6379</text>

  <rect x="470" y="763" width="230" height="92" class="box" fill="#e5e7eb"/>
  <text x="585" y="795" text-anchor="middle" class="label">Worker</text>
  <text x="585" y="821" text-anchor="middle" class="small">Deployment • 1 replica</text>
  <text x="585" y="842" text-anchor="middle" class="tiny">Java processor</text>

  <rect x="795" y="685" width="250" height="104" class="box" fill="#93c5fd"/>
  <text x="920" y="719" text-anchor="middle" class="label">Postgres</text>
  <text x="920" y="746" text-anchor="middle" class="small">StatefulSet • 1 replica</text>
  <text x="920" y="768" text-anchor="middle" class="tiny">postgres-service :5432</text>

  <rect x="795" y="815" width="250" height="48" rx="14" fill="#dbeafe" stroke="#1d4ed8" stroke-width="2"/>
  <text x="920" y="845" text-anchor="middle" class="small">PVC/PV: /var/lib/postgresql/data</text>

  <path d="M1068 476 C1068 535, 330 535, 290 610" class="arrow"/>
  <text x="665" y="522" text-anchor="middle" class="tiny">Traefik routes public HTTP traffic</text>

  <path d="M1068 476 C1068 555, 330 710, 290 765" class="arrow"/>

  <path d="M375 654 L470 654" class="arrow"/>
  <text x="422" y="640" text-anchor="middle" class="tiny">votes</text>

  <path d="M585 700 L585 763" class="arrow"/>
  <text x="630" y="735" class="tiny">read queue</text>

  <path d="M700 809 C750 805, 765 750, 795 737" class="arrow"/>
  <text x="745" y="788" class="tiny">write result</text>

  <path d="M375 809 L795 737" class="arrow"/>
  <text x="585" y="745" text-anchor="middle" class="tiny">read persisted votes</text>

  <path d="M920 789 L920 815" class="arrow"/>

  <rect x="1140" y="530" width="365" height="360" class="ns"/>
  <text x="1165" y="565" class="section">kube-system namespace</text>

  <rect x="1200" y="625" width="245" height="110" class="box" fill="#ddd6fe"/>
  <text x="1323" y="661" text-anchor="middle" class="label">cAdvisor</text>
  <text x="1323" y="688" text-anchor="middle" class="small">DaemonSet • all nodes</text>
  <text x="1323" y="711" text-anchor="middle" class="tiny">image: gcr.io/cadvisor/cadvisor:latest</text>

  <rect x="1200" y="780" width="245" height="62" class="box" fill="#ede9fe"/>
  <text x="1323" y="807" text-anchor="middle" class="label">cadvisor-service</text>
  <text x="1323" y="830" text-anchor="middle" class="small">ClusterIP :8080</text>

  <path d="M1323 735 L1323 780" class="arrow"/>
  <path d="M1170 255 C1230 365, 1323 510, 1323 625" class="arrowBlue"/>

  <rect x="120" y="910" width="1360" height="24" rx="12" fill="#fef3c7"/>
  <text x="800" y="927" text-anchor="middle" class="tiny">Object rule: Deployments for stateless apps/reverse proxy • StatefulSets for Redis/Postgres • DaemonSet for one cAdvisor pod per node</text>
</svg>
